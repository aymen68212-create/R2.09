<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des livres</title>
</head>
<body>
    <h1>Liste des livres</h1>
    <a href="/bibliotheque/ajout">Ajouter un livre</a>
    <ul>
        {% for livre in livres %}
            <li>
                <a href="/bibliotheque/affiche/{{livre.id}}/">{{livre}}</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
